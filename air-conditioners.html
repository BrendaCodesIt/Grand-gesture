<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Conditioners - Grand Gesture</title>
    <meta name="description" content="Discover our wide range of Hisense air conditioners at Grand Gesture." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="tv-layout">
    <header class="top-header" aria-label="Main header">
      <a href="index.html" class="brand" aria-label="Homepage">Grand Gesture</a>

      <nav class="header-actions" aria-label="Quick actions">
        <a href="cart.html" class="icon-btn" aria-label="Cart">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
          </svg>
        </a>

        <button class="icon-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5" />
            <line x1="16" y1="16" x2="21" y2="21" />
          </svg>
        </button>

        <button
          class="icon-btn"
          aria-label="Categories"
          aria-expanded="false"
          aria-controls="categories-menu"
          id="menu-toggle"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </nav>
    </header>

    <section
      class="categories-panel"
      id="categories-menu"
      aria-label="Product categories"
      hidden
    >
      <h2 class="categories-title">Categories</h2>
      <ul class="categories-list">
        <li><a href="tvs.html">TV's</a></li>
        <li><a href="#">Sound Bars</a></li>
        <li><a href="air-conditioners.html">Air Conditioners</a></li>
        <li><a href="#">Refrigrators</a></li>
        <li><a href="#">Washing Machines</a></li>
        <li><a href="#">Kitchen Appliances</a></li>
        <li><a href="other-appliances.html">Other Appliances</a></li>
      </ul>
    </section>

    <main class="tv-page" aria-label="Air Conditioners Collection">
      <section class="tv-featured-block" aria-label="Hisense 1.5hp Split AC details">
        <figure class="tv-featured-image-wrap">
          <img
            src="images/Air conditioner 1.png"
            alt="Hisense 1.5hp split aircon cooling only product image"
            class="tv-featured-image"
          />
        </figure>

        <div class="tv-featured-copy">
          <h2 class="tv-featured-title">Hisense 1.5hp split aircon cooling only TG basic panel R419a, 3m pipe 12000BTU</h2>
          <p class="tv-featured-subtitle">Product Features</p>

          <figure class="tv-specs-figure">
            <img
              src="images/Air conditioner 1 features.png"
              alt="Hisense 1.5hp split aircon specifications table"
              class="tv-specs-image"
            />
          </figure>
        </div>

        <aside class="tv-featured-models" aria-label="AC models">
          <button
            type="button"
            class="tv-model-btn tv-model-btn--inline"
            data-id="hisense-ac-split-9000-btu-inverter-1-5hp"
            data-name="Hisense ac split 9000 BTU-WITH INVERTER 1.5HP"
            data-price="0"
          >
            Hisense ac split 9000 BTU-WITH INVERTER 1.5HP
          </button>
          <button
            type="button"
            class="tv-model-btn tv-model-btn--inline"
            data-id="hisense-aircon-cooling-heating-inverter-12000btu"
            data-name="Hisense AIR CON cooling and heating WITH INVERTER basic panel R419a, 3m pipe 12000BTU"
            data-price="0"
          >
            Hisense AIR CON cooling and heating WITH INVERTER basic panel R419a, 3m pipe 12000BTU
          </button>
        </aside>
      </section>

      <section class="tv-bottom-bar" aria-label="Product actions">
        <div class="tv-actions">
          <button
            type="button"
            class="action-btn action-btn--buy"
            id="quick-buy-btn"
            aria-expanded="false"
            aria-controls="quick-buy-dropdown"
          >
            Add to Cart
          </button>

          <div class="quick-buy-dropdown" id="quick-buy-dropdown" hidden>
            <p class="quick-buy-name" id="dropdown-product-name">Select an Air Conditioner</p>
            <p class="quick-buy-price" id="dropdown-product-price">Ksh 0</p>
            <button type="button" class="quick-buy-confirm" id="quick-buy-confirm-btn">Confirm Add</button>
          </div>
        </div>
      </section>

    </main>

    <script>
      /* ── Categories menu toggle ── */
      const menuToggle = document.getElementById("menu-toggle");
      const categoriesMenu = document.getElementById("categories-menu");

      menuToggle.addEventListener("click", () => {
        const isOpen = menuToggle.getAttribute("aria-expanded") === "true";
        menuToggle.setAttribute("aria-expanded", String(!isOpen));
        categoriesMenu.hidden = isOpen;
      });

      document.addEventListener("click", (event) => {
        if (
          !categoriesMenu.contains(event.target) &&
          !menuToggle.contains(event.target)
        ) {
          menuToggle.setAttribute("aria-expanded", "false");
          categoriesMenu.hidden = true;
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          menuToggle.setAttribute("aria-expanded", "false");
          categoriesMenu.hidden = true;
        }
      });

      /* ── Selection logic ── */
      let selectedProduct = null;

      const modelBtns = document.querySelectorAll(".tv-model-btn");
      const quickBuyBtn = document.getElementById("quick-buy-btn");
      const quickBuyDropdown = document.getElementById("quick-buy-dropdown");
      const dropdownName = document.getElementById("dropdown-product-name");
      const dropdownPrice = document.getElementById("dropdown-product-price");
      const confirmBtn = document.getElementById("quick-buy-confirm-btn");
      const actionsContainer = document.querySelector(".tv-actions");

      modelBtns.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          if (e.target.tagName.toLowerCase() === "a") {
            return;
          }
          
          modelBtns.forEach((b) => b.classList.remove("is-active"));
          btn.classList.add("is-active");

          selectedProduct = {
            id: btn.dataset.id,
            name: btn.dataset.name,
            price: parseInt(btn.dataset.price, 10),
            displayPrice: "Ksh " + parseInt(btn.dataset.price, 10).toLocaleString(),
            category: "Air Conditioners",
            image: btn.closest('.tv-featured-block').querySelector('img').getAttribute('src')
          };

          dropdownName.textContent = selectedProduct.name;
          dropdownPrice.textContent = selectedProduct.displayPrice;
          quickBuyBtn.classList.add("ready");
          
          if (quickBuyBtn.getAttribute("aria-expanded") === "true") {
             quickBuyBtn.setAttribute("aria-expanded", "false");
             quickBuyDropdown.hidden = true;
          }
        });
      });

      /* Toggle dropdown */
      quickBuyBtn.addEventListener("click", () => {
        if (!selectedProduct) {
          alert("Please select an air conditioner model first.");
          return;
        }

        const isOpen = quickBuyBtn.getAttribute("aria-expanded") === "true";
        quickBuyBtn.setAttribute("aria-expanded", String(!isOpen));
        quickBuyDropdown.hidden = isOpen;
      });

      /* ── Cart helpers ── */
      function getCartItems() {
        return JSON.parse(localStorage.getItem("cartItems")) || [];
      }

      function saveCartItems(items) {
        localStorage.setItem("cartItems", JSON.stringify(items));
      }

      /* Confirm add to cart */
      confirmBtn.addEventListener("click", () => {
        if (!selectedProduct) return;

        const cartItems = getCartItems();
        const existing = cartItems.find((ci) => ci.id === selectedProduct.id);

        if (existing) {
          existing.quantity = (existing.quantity || 1) + 1;
          existing.price = selectedProduct.price;
          existing.displayPrice = selectedProduct.displayPrice;
          existing.image = selectedProduct.image;
          existing.category = selectedProduct.category;
          existing.name = selectedProduct.name;
        } else {
          cartItems.push({ ...selectedProduct, quantity: 1 });
        }

        saveCartItems(cartItems);

        quickBuyBtn.textContent = "Added";
        quickBuyBtn.classList.remove("ready");
        quickBuyBtn.setAttribute("aria-expanded", "false");
        quickBuyDropdown.hidden = true;
        setTimeout(() => {
          quickBuyBtn.textContent = "Add to Cart";
          modelBtns.forEach((b) => b.classList.remove("is-active"));
          selectedProduct = null;
        }, 1300);
      });

      /* Close dropdown when clicking outside */
      document.addEventListener("click", (event) => {
        if (actionsContainer && !actionsContainer.contains(event.target)) {
          quickBuyBtn.setAttribute("aria-expanded", "false");
          quickBuyDropdown.hidden = true;
        }
      });
    </script>
  </body>
</html>
