<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - Grand Gesture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-header" aria-label="Main header">
      <a href="index.html" class="brand" aria-label="Homepage">Grand Gesture</a>

      <nav class="header-actions" aria-label="Quick actions">
        <a href="cart.html" class="icon-btn" aria-label="Cart">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
          </svg>
        </a>

        <button class="icon-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5" />
            <line x1="16" y1="16" x2="21" y2="21" />
          </svg>
        </button>

        <button
          class="icon-btn"
          aria-label="Categories"
          aria-expanded="false"
          aria-controls="categories-menu"
          id="menu-toggle"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </nav>
    </header>

    <section
      class="categories-panel"
      id="categories-menu"
      aria-label="Product categories"
      hidden
    >
      <h2 class="categories-title">Categories</h2>
      <ul class="categories-list">
        <li><a href="categories/tvs.html">TV's</a></li>
        <li><a href="categories/soundbars.html">Sound Bars</a></li>
        <li><a href="categories/air-conditioners.html">Air Conditioners</a></li>
        <li><a href="categories/refrigerators.html">Refrigerators</a></li>
        <li><a href="categories/washing-machines.html">Washing Machines</a></li>
        <li><a href="categories/kitchen-appliances.html">Kitchen Appliances</a></li>
        <li><a href="categories/other-appliances.html">Other Appliances</a></li>
      </ul>
    </section>

    <main class="cart-page" aria-label="Cart section">
      <section class="cart-panel">
        <h1 class="cart-title">Your Cart</h1>
        <p class="cart-subtitle">Items selected from the TVs page appear here with image and price.</p>

        <div id="cart-empty" class="cart-empty" hidden>
          Your cart is empty.
        </div>

        <div id="cart-items" class="cart-items"></div>

        <div id="cart-summary" class="cart-summary" hidden>
          <span>Total</span>
          <strong id="cart-total">KSh 0</strong>
        </div>
      </section>
    </main>

    <script>
      const menuToggle = document.getElementById("menu-toggle");
      const categoriesMenu = document.getElementById("categories-menu");
      const cartItemsContainer = document.getElementById("cart-items");
      const cartEmpty = document.getElementById("cart-empty");
      const cartSummary = document.getElementById("cart-summary");
      const cartTotal = document.getElementById("cart-total");

      function formatKes(value) {
        return `KSh ${Number(value || 0).toLocaleString("en-KE")}`;
      }

      function normalizeCartItem(item) {
        if (item.id === "hisense-32-smart-frameless-fhd-a4") {
          return {
            ...item,
            name: 'Hisense 32" Smart Frameless FHD (A4 series)',
          };
        }

        if (item.id === "hisense-43-smart-frameless-fhd-a4") {
          return {
            ...item,
            name: 'Hisense 43" Smart Frameless FHD (A4 series)',
          };
        }

        if (item.id === "hisense-43-smart-4k-uhd-frameless-a6") {
          return {
            ...item,
            name: 'Hisense 43" Smart 4k UHD Frameless (A6 series)',
          };
        }

        if (item.id === "hisense-43-inch-qled-smart-4k-uhd-frameless-q6") {
          return {
            ...item,
            name: 'Hisense 43" QLED Smart 4k UHD Frameless (Q6 series)',
          };
        }

        if (item.id === "hisense-50-inch-led-smart-2k-fhd-frameless-a4") {
          return {
            ...item,
            name: 'Hisense 50" LED Smart 2K FHD Frameless (A4 series)',
          };
        }

        if (item.id === "hisense-50-smart-uhd-4k-frameless-a6") {
          return {
            ...item,
            name: 'Hisense 50" smart UHD 4k Frameless (A6 series)',
          };
        }

        if (item.id === "hisense-50-inch-qled-smart-4k-frameless-q6") {
          return {
            ...item,
            name: 'Hisense 50" Qled smart 4k Frameless (Q6 series)',
          };
        }

        if (item.id === "hisense-55-smart-4k-frameless-a6") {
          return {
            ...item,
            name: 'Hisense 55" Smart 4K Frameless(A6 series)',
          };
        }

        if (item.id === "hisense-55-inch-4k-qled-tv-q6-series") {
          return {
            ...item,
            name: 'Hisense 55" 4K QLED TV (Q6 Series)',
          };
        }

        return item;
      }

      function renderCart() {
        const cartItems = (JSON.parse(localStorage.getItem("cartItems")) || []).map(normalizeCartItem);

        localStorage.setItem("cartItems", JSON.stringify(cartItems));

        if (cartItems.length === 0) {
          localStorage.removeItem("cartItems");
          cartItemsContainer.innerHTML = "";
          cartEmpty.hidden = false;
          cartSummary.hidden = true;
          cartTotal.textContent = "KSh 0";
          return;
        }

        cartEmpty.hidden = true;
        cartSummary.hidden = false;

        const itemsMarkup = cartItems
          .map((item) => {
            const quantity = item.quantity || 1;
            const unitPrice = Number(item.price || 0);
            const lineTotal = unitPrice * quantity;

            return `
              <article class="cart-item">
                <img class="cart-item-image" src="${item.image}" alt="${item.name}" />
                <div class="cart-item-info">
                  <h2>${item.name}</h2>
                  <p class="cart-item-category">${item.category || "Electronics"}</p>
                  <p class="cart-item-price">Price: ${item.displayPrice || formatKes(unitPrice)}</p>
                  <div class="cart-item-controls">
                    <div class="qty-controls" role="group" aria-label="Quantity controls for ${item.name}">
                      <button type="button" class="qty-btn" data-action="decrease" data-id="${item.id}" aria-label="Decrease quantity">-</button>
                      <span class="qty-value">${quantity}</span>
                      <button type="button" class="qty-btn" data-action="increase" data-id="${item.id}" aria-label="Increase quantity">+</button>
                    </div>
                    <button type="button" class="remove-btn" data-action="remove" data-id="${item.id}">Remove</button>
                  </div>
                </div>
                <p class="cart-item-total">${formatKes(lineTotal)}</p>
              </article>
            `;
          })
          .join("");

        const total = cartItems.reduce((sum, item) => {
          const quantity = item.quantity || 1;
          const unitPrice = Number(item.price || 0);
          return sum + quantity * unitPrice;
        }, 0);

        cartItemsContainer.innerHTML = itemsMarkup;
        cartTotal.textContent = formatKes(total);
      }

      menuToggle.addEventListener("click", () => {
        const isOpen = menuToggle.getAttribute("aria-expanded") === "true";
        menuToggle.setAttribute("aria-expanded", String(!isOpen));
        categoriesMenu.hidden = isOpen;
      });

      document.addEventListener("click", (event) => {
        const clickedInsideMenu = categoriesMenu.contains(event.target);
        const clickedToggle = menuToggle.contains(event.target);

        if (!clickedInsideMenu && !clickedToggle) {
          menuToggle.setAttribute("aria-expanded", "false");
          categoriesMenu.hidden = true;
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          menuToggle.setAttribute("aria-expanded", "false");
          categoriesMenu.hidden = true;
        }
      });

      cartItemsContainer.addEventListener("click", (event) => {
        const action = event.target.getAttribute("data-action");
        const itemId = event.target.getAttribute("data-id");

        if (!action || !itemId) {
          return;
        }

        const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
        const itemIndex = cartItems.findIndex((item) => item.id === itemId);

        if (itemIndex === -1) {
          return;
        }

        if (action === "increase") {
          cartItems[itemIndex].quantity = (cartItems[itemIndex].quantity || 1) + 1;
        }

        if (action === "decrease") {
          const currentQty = cartItems[itemIndex].quantity || 1;
          if (currentQty > 1) {
            cartItems[itemIndex].quantity = currentQty - 1;
          } else {
            cartItems.splice(itemIndex, 1);
          }
        }

        if (action === "remove") {
          cartItems.splice(itemIndex, 1);
        }

        if (cartItems.length === 0) {
          localStorage.removeItem("cartItems");
        } else {
          localStorage.setItem("cartItems", JSON.stringify(cartItems));
        }

        renderCart();
      });

      renderCart();
    </script>
  </body>
</html>
