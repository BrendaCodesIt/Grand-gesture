    <script>
      const menuToggle = document.getElementById("menu-toggle");
      const categoriesMenu = document.getElementById("categories-menu");

      menuToggle.addEventListener("click", () => {
        const isOpen = menuToggle.getAttribute("aria-expanded") === "true";
        menuToggle.setAttribute("aria-expanded", String(!isOpen));
        categoriesMenu.hidden = isOpen;
      });

      document.addEventListener("click", (event) => {
        const clickedInsideMenu = categoriesMenu.contains(event.target);
        const clickedToggle = menuToggle.contains(event.target);

        if (!clickedInsideMenu && !clickedToggle) {
          menuToggle.setAttribute("aria-expanded", "false");
          categoriesMenu.hidden = true;
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          menuToggle.setAttribute("aria-expanded", "false");
          categoriesMenu.hidden = true;
        }
      });
    
      const addBtn = document.getElementById("product-confirm-btn");
      if(addBtn) {
        addBtn.addEventListener("click", () => {
          let priceMatch = document.querySelector(".tv-featured-title");
          let name = priceMatch ? priceMatch.textContent.trim() : "Product";
          
          let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
          let existing = cartItems.find((ci) => ci.name === name);
          
          if (existing) {
            existing.quantity = (existing.quantity || 1) + 1;
          } else {
            cartItems.push({
              id: name.toLowerCase().replace(/\s+/g, '-'),
              name: name,
              price: 0,
              displayPrice: "Call for Price",
              category: "Products",
              image: document.querySelector(".tv-featured-image") ? document.querySelector(".tv-featured-image").getAttribute("src") : "",
              quantity: 1
            });
          }
          
          localStorage.setItem("cartItems", JSON.stringify(cartItems));
          addBtn.textContent = "Added ✓";
          addBtn.style.backgroundColor = "#4caf50";
          addBtn.style.color = "#fff";
          
          setTimeout(() => { 
            addBtn.textContent = "Add to Cart"; 
            addBtn.style.backgroundColor = "#fca311";
            addBtn.style.color = "#14213d";
          }, 1300);
        });
      }
</script>
